<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <!-- Base linear gradient: #0a3314 → #031508 at 135deg -->
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3314"/>
      <stop offset="100%" stop-color="#031508"/>
    </linearGradient>

    <!-- Radial glow at 40% 50% -->
    <radialGradient id="glowGradient" cx="40%" cy="50%" r="60%" fx="40%" fy="50%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.4)" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="rgba(34,197,94,0)" stop-opacity="0"/>
    </radialGradient>

    <!-- Stripe pattern: 2px white at 1% opacity every 40px -->
    <pattern id="stripes" x="0" y="0" width="40" height="900" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="900" fill="rgba(255,255,255,0.01)"/>
    </pattern>

    <!-- Mask to fade stripes from full opacity at top to 0.2 at bottom -->
    <linearGradient id="stripeMask" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.2"/>
    </linearGradient>
    <mask id="stripeFade">
      <rect width="1440" height="900" fill="url(#stripeMask)"/>
    </mask>

    <!-- Glass shape gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.02)" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Base gradient -->
  <rect width="1440" height="900" fill="url(#baseGradient)"/>

  <!-- Layer 2: Radial green glow -->
  <rect width="1440" height="900" fill="url(#glowGradient)"/>

  <!-- Layer 3: Vertical stripes with fade mask -->
  <rect width="1440" height="900" fill="url(#stripes)" mask="url(#stripeFade)"/>

  <!-- Layer 4: Glass shape 1 — 800×800, top-right, rotate(-15deg) -->
  <g transform="translate(1340, -200) rotate(-15)">
    <rect
      x="-400" y="-400"
      width="800" height="800"
      rx="40" ry="40"
      fill="url(#glassGrad)"
      stroke="rgba(100,255,100,0.2)"
      stroke-width="1"
    />
  </g>

  <!-- Layer 5: Glass shape 2 — 1000×600, bottom-left, rotate(15deg) -->
  <g transform="translate(-100, 750) rotate(15)">
    <rect
      x="0" y="-300"
      width="1000" height="600"
      rx="60" ry="60"
      fill="none"
      stroke="rgba(100,255,100,0.2)"
      stroke-width="1"
    />
  </g>
</svg>
